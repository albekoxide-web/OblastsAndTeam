<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Ultimate</title>
    
    <!-- ВИКОРИСТОВУЄМО ОФІЦІЙНИЙ GOOGLE CDN (НАЙСТАБІЛЬНІШИЙ) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --p: #00ff88; --s: #00d4ff; --bg: #050508; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        #lobby { position: absolute; inset: 0; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .window { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.4); color: white; outline: none; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-main { background: linear-gradient(45deg, var(--p), var(--s)); color: #000; }
        #gui { position: absolute; top: 15px; left: 15px; display: none; flex-direction: column; gap: 5px; z-index: 500; }
        .stat { background: rgba(0,0,0,0.7); padding: 6px 15px; border-radius: 10px; border-left: 4px solid var(--p); font-size: 14px; font-weight: bold; }
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 600; border: 1px solid rgba(255,255,255,0.2); }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--p); border-radius: 50%; box-shadow: 0 0 15px var(--p); }
        #actions { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 12px; z-index: 600; }
        .act-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid var(--p); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; position: relative; }
        .act-btn span { position: absolute; bottom: -18px; font-size: 8px; color: var(--p); font-weight: bold; text-align: center; width: 80px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="lobby">
    <div id="m-start" class="window">
        <h1 style="color:var(--p); letter-spacing:5px;">OBLASTS</h1>
        <p id="status-text" style="font-size: 10px; color: #888;">Завантаження сервера...</p>
        <input type="text" id="nick" placeholder="ТВІЙ НІК">
        <button class="btn btn-main" onclick="showSettings()">СТВОРИТИ СВІТ</button>
        <input type="text" id="joinCode" placeholder="КОД КІМНАТИ">
        <button class="btn" style="background:#333; color:#fff" onclick="joinGame()">ПРИЄДНАТИСЯ</button>
    </div>
    <div id="m-settings" class="window" style="display:none">
        <h3>НАЛАШТУВАННЯ</h3>
        <select id="mapSize"><option value="4000">4000x4000</option><option value="8000" selected>8000x8000</option></select>
        <button class="btn btn-main" onclick="finalizeCreate()">ГОТОВО</button>
    </div>
    <div id="m-code" class="window" style="display:none">
        <p>КОД КІМНАТИ:</p>
        <h1 id="shareCode" style="color:var(--p); letter-spacing:5px;">XXXX</h1>
        <button class="btn btn-main" onclick="enterWorld()">ПОЧАТИ</button>
    </div>
</div>

<div id="gui">
    <div class="stat">🌲 <span id="r_wood">0</span> | 🪨 <span id="r_stone">0</span></div>
    <div class="stat">🍎 <span id="r_food">0</span> | 👥 <span id="r_pop">0</span></div>
</div>

<div id="joy-bg"><div id="joy-stick"></div></div>
<div id="actions">
    <div class="act-btn" onclick="act('mine')">⛏️<span>ЗБІР</span></div>
    <div class="act-btn" onclick="act('flag')">🚩<span>ОБЛАСТЬ</span></div>
</div>

<canvas id="game"></canvas>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAxOs_OKSmIm5vv2ruW_8HGTjHK0lo-9nI",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "oblastandteam",
  storageBucket: "oblastandteam.firebasestorage.app",
  messagingSenderId: "1070668055977",
  appId: "1:1070668055977:web:01886461edd6a9cedf30b8"
};

let db, roomID = "", mapLimit = 4000;
let me = { x: 0, y: 0, wood: 100, stone: 50, food: 100, pop: 1, nick: "", color: "" };
let players = {}, flags = {}, items = {};
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');

window.onload = function() {
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        document.getElementById('status-text').innerText = "Сервер: Готово ✅";
        document.getElementById('status-text').style.color = "#00ff88";
    } else {
        document.getElementById('status-text').innerText = "Помилка! Вимкни AdBlock.";
        document.getElementById('status-text').style.color = "#ff4444";
    }
};

function showSettings() { 
    if(!db) return alert("Сервер ще не готовий!");
    if(!document.getElementById('nick').value) return alert("ВВЕДИ НІК!");
    document.getElementById('m-start').style.display='none'; 
    document.getElementById('m-settings').style.display='block'; 
}

function finalizeCreate() {
    roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
    mapLimit = parseInt(document.getElementById('mapSize').value);
    let res = {};
    for(let i=0; i<100; i++) {
        let t = Math.random();
        res['r'+i] = { x: Math.random()*mapLimit, y: Math.random()*mapLimit, type: t>0.5?'t':'s' };
    }
    db.ref('rooms/'+roomID).set({ settings: { limit: mapLimit }, items: res }).then(() => {
        document.getElementById('m-settings').style.display='none';
        document.getElementById('m-code').style.display='block';
        document.getElementById('shareCode').innerText = roomID;
    });
}

function joinGame() {
    const nick = document.getElementById('nick').value, code = document.getElementById('joinCode').value.toUpperCase();
    if(!nick || !code || !db) return alert("Заповни поля!");
    db.ref('rooms/'+code).once('value', s => {
        if(s.exists()) { roomID = code; mapLimit = s.val().settings.limit; enterWorld(); }
        else alert("КОД НЕВІРНИЙ");
    });
}

function enterWorld() {
    me.nick = document.getElementById('nick').value; me.color = `hsl(${Math.random()*360}, 75%, 55%)`; me.x = me.y = mapLimit / 2;
    document.getElementById('lobby').style.display='none'; document.getElementById('gui').style.display='flex'; document.getElementById('joy-bg').style.display='block'; document.getElementById('actions').style.display='flex';
    db.ref('rooms/'+roomID+'/players/'+me.nick).onDisconnect().remove();
    db.ref('rooms/'+roomID+'/players').on('value', s => players = s.val() || {});
    db.ref('rooms/'+roomID+'/flags').on('value', s => flags = s.val() || {});
    db.ref('rooms/'+roomID+'/items').on('value', s => items = s.val() || {});
    requestAnimationFrame(loop);
}

function act(type) {
    if(type === 'mine') {
        for(let id in items) {
            let it = items[id];
            if(Math.hypot(me.x - it.x, me.y - it.y) < 100) {
                if(it.type === 't') me.wood += 20; else me.stone += 15;
                db.ref('rooms/'+roomID+'/items/'+id).remove(); return;
            }
        }
    }
    if(type === 'flag' && me.wood >= 50) {
        db.ref('rooms/'+roomID+'/flags/'+Date.now()).set({x: me.x, y: me.y, color: me.color, owner: me.nick});
        me.wood -= 50;
    }
}

const jBg = document.getElementById('joy-bg'), jSt = document.getElementById('joy-stick');
function hS(cx, cy) { joy.active = true; joy.startX = cx; joy.startY = cy; }
function hM(cx, cy) {
    if(!joy.active) return;
    let dx = cx - joy.startX, dy = cy - joy.startY, dist = Math.min(Math.hypot(dx, dy), 40), angle = Math.atan2(dy, dx);
    joy.x = Math.cos(angle) * (dist / 40); joy.y = Math.sin(angle) * (dist / 40);
    jSt.style.transform = `translate(${joy.x*40}px, ${joy.y*40}px)`;
}
function hE() { joy.active = false; joy.x = joy.y = 0; jSt.style.transform = `translate(0,0)`; }
jBg.addEventListener('touchstart', e => hS(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener('touchmove', e => hM(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener('touchend', hE);

function loop() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if(joy.active) { me.x += joy.x * 8; me.y += joy.y * 8; db.ref('rooms/'+roomID+'/players/'+me.nick).set(me); }
    ctx.save(); ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);
    for(let id in flags) {
        let f = flags[id]; ctx.fillStyle = f.color.replace('55%)','15%)'); ctx.beginPath(); ctx.arc(f.x, f.y, 300, 0, 7); ctx.fill();
        ctx.fillStyle = f.color; ctx.fillRect(f.x-2, f.y-35, 4, 35);
    }
    for(let id in items) {
        let it = items[id]; ctx.fillStyle = it.type==='t'?'#00ff88':'#95a5a6';
        ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, 7); ctx.fill();
    }
    for(let id in players) {
        let p = players[id]; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, 7); ctx.fill();
        ctx.fillStyle = "white"; ctx.fillText(p.nick, p.x-10, p.y-25);
    }
    ctx.restore();
    document.getElementById('r_wood').innerText = me.wood;
    document.getElementById('r_stone').innerText = me.stone;
    requestAnimationFrame(loop);
}
</script>
</body>
</html>

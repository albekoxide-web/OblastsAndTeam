<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Hardcore Strategy</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        #lobby { position: absolute; inset: 0; background: #0f2027; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .window { background: #2c3e50; padding: 25px; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; background: #34495e; color: white; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .btn-green { background: #27ae60; color: white; }
        #gui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; pointer-events: none; border: 1px solid #444; }
        .res-item { font-size: 16px; margin: 3px 0; display: flex; justify-content: space-between; gap: 20px; }
        #minimap { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.5); border: 2px solid #555; }
        #mobile-controls { position: absolute; bottom: 20px; right: 20px; display: none; flex-direction: column; gap: 10px; }
        .m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid #fff; pointer-events: auto; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="lobby">
    <div id="main-menu" class="window">
        <h2>Oblasts & Team</h2>
        <input type="text" id="nick" placeholder="Твой Ник">
        <button class="btn-green" onclick="showSettings()">СОЗДАТЬ ПОЛОТНО</button>
        <input type="text" id="joinCode" placeholder="Код комнаты">
        <button style="background:#2980b9; color:white;" onclick="joinGame()">ВОЙТИ</button>
    </div>
    <div id="settings-menu" class="window" style="display:none;">
        <h3>Настройки</h3>
        <select id="mapSize"><option value="3000">Маленькая</option><option value="6000" selected>Средняя</option></select>
        <button class="btn-green" onclick="createGame()">ГОТОВО</button>
    </div>
    <div id="code-menu" class="window" style="display:none;">
        <p>Твой код:</p>
        <h1 id="displayCode" style="color:#f1c40f">XXXX</h1>
        <button class="btn-green" onclick="enterWorld()">ИГРАТЬ</button>
    </div>
</div>

<div id="gui">
    <div class="res-item">🌲 Дерево: <span id="r_wood">0</span></div>
    <div class="res-item">🍎 Еда: <span id="r_food">0</span></div>
    <div class="res-item">👥 Люди: <span id="r_pop">0</span></div>
    <hr>
    <div style="font-size:11px; color:#aaa">WASD-Ходить | F-Добыча | E-Флаг | B-Дом</div>
</div>

<div id="mobile-controls">
    <div class="m-btn" onclick="action('flag')">🚩</div>
    <div class="m-btn" onclick="action('house')">🏠</div>
    <div class="m-btn" onclick="action('harvest')">⛏️</div>
</div>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAxOs_OKSmIm5vv2ruW_8HGTjHK0lo-9nI",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "oblastandteam",
  storageBucket: "oblastandteam.firebasestorage.app",
  messagingSenderId: "1070668055977",
  appId: "1:1070668055977:web:01886461edd6a9cedf30b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let player = { x: 0, y: 0, wood: 100, food: 100, pop: 1, nick: "", color: "" };
let players = {}, flags = {}, buildings = {}, worldItems = {}, roomID = "", mapSize = 6000;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap');
const mCtx = mCanvas.getContext('2d');

function showSettings() { if(document.getElementById('nick').value) { document.getElementById('main-menu').style.display='none'; document.getElementById('settings-menu').style.display='block'; } }

function createGame() {
    roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
    mapSize = document.getElementById('mapSize').value;
    let items = {};
    for(let i=0; i<40; i++) items['i'+i] = {x:Math.random()*mapSize, y:Math.random()*mapSize, type: Math.random()>0.5?'tree':'bush'};
    db.ref('rooms/'+roomID).set({ settings: {limit: mapSize}, worldItems: items });
    document.getElementById('settings-menu').style.display='none';
    document.getElementById('code-menu').style.display='block';
    document.getElementById('displayCode').innerText = roomID;
}

function joinGame() {
    const nick = document.getElementById('nick').value;
    const code = document.getElementById('joinCode').value.toUpperCase();
    db.ref('rooms/'+code).once('value', s => {
        if(s.exists()) { roomID = code; mapSize = s.val().settings.limit; enterWorld(); }
    });
}

function enterWorld() {
    player.nick = document.getElementById('nick').value;
    player.color = `hsl(${Math.random()*360}, 70%, 50%)`;
    player.x = player.y = mapSize/2;
    document.getElementById('lobby').style.display='none';
    document.getElementById('gui').style.display='block';
    document.getElementById('mobile-controls').style.display='flex';
    
    db.ref('rooms/'+roomID+'/players/'+player.nick).onDisconnect().remove();
    db.ref('rooms/'+roomID+'/players').on('value', s => players = s.val() || {});
    db.ref('rooms/'+roomID+'/flags').on('value', s => flags = s.val() || {});
    db.ref('rooms/'+roomID+'/buildings').on('value', s => buildings = s.val() || {});
    db.ref('rooms/'+roomID+'/worldItems').on('value', s => worldItems = s.val() || {});

    setInterval(survivalCycle, 2000);
    requestAnimationFrame(loop);
}

function survivalCycle() {
    if(player.food > 0) { player.food -= player.pop * 0.2; player.pop += 0.1; } 
    else { player.pop -= 0.5; if(player.pop < 0) player.pop = 0; }
    db.ref('rooms/'+roomID+'/players/'+player.nick).set(player);
}

function action(type) {
    if(type === 'flag' && player.wood >= 50) { db.ref('rooms/'+roomID+'/flags/'+Date.now()).set({x:player.x, y:player.y, color:player.color}); player.wood -= 50; }
    if(type === 'house' && player.wood >= 100) { db.ref('rooms/'+roomID+'/buildings/'+Date.now()).set({x:player.x, y:player.y, color:player.color}); player.wood -= 100; player.pop += 5; }
    if(type === 'harvest') harvest();
}

function harvest() {
    for(let id in worldItems) {
        let it = worldItems[id];
        if(Math.hypot(player.x-it.x, player.y-it.y) < 60) {
            if(it.type === 'tree') player.wood += 5; else player.food += 10;
            return;
        }
    }
}

let keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyE') action('flag');
    if(e.code === 'KeyB') action('house');
    if(e.code === 'KeyF') action('harvest');
});
window.addEventListener('keyup', e => keys[e.code] = false);

function loop() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if(keys['KeyW']) player.y -= 8; if(keys['KeyS']) player.y += 8;
    if(keys['KeyA']) player.x -= 8; if(keys['KeyD']) player.x += 8;
    if(keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) db.ref('rooms/'+roomID+'/players/'+player.nick).set(player);

    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
    
    ctx.strokeStyle = "#555"; ctx.strokeRect(0,0,mapSize,mapSize);

    for(let id in flags) { ctx.fillStyle = flags[id].color.replace('50%)','10%)'); ctx.fillRect(flags[id].x-200, flags[id].y-200, 400, 400); }
    for(let id in worldItems) { 
        let it = worldItems[id]; ctx.fillStyle = it.type==='tree'?'#27ae60':'#e67e22'; 
        ctx.beginPath(); ctx.arc(it.x, it.y, 20, 0, 7); ctx.fill(); 
    }
    for(let id in buildings) { ctx.fillStyle = "#8e44ad"; ctx.fillRect(buildings[id].x-25, buildings[id].y-25, 50, 50); }
    for(let id in players) {
        let p = players[id]; ctx.fillStyle = p.color; ctx.fillRect(p.x-15, p.y-15, 30, 30);
        ctx.fillStyle = "white"; ctx.fillText(p.nick + " (👥"+Math.floor(p.pop)+")", p.x-20, p.y-25);
    }
    ctx.restore();

    // Minimap
    mCtx.clearRect(0,0,150,150);
    for(let id in players) {
        mCtx.fillStyle = players[id].color;
        mCtx.fillRect((players[id].x/mapSize)*150, (players[id].y/mapSize)*150, 4, 4);
    }

    document.getElementById('r_wood').innerText = Math.floor(player.wood);
    document.getElementById('r_food').innerText = Math.floor(player.food);
    document.getElementById('r_pop').innerText = Math.floor(player.pop);
    requestAnimationFrame(loop);
}
</script>
</body>
</html>

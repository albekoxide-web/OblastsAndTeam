<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Ultimate P2P</title>
    
    <!-- Пытаемся загрузить PeerJS из самого надежного источника -->
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --p: #00ff88; --s: #00d4ff; --bg: #050508; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        
        /* Лобби */
        #lobby { position: absolute; inset: 0; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .window { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: rgba(0,0,0,0.4); color: white; outline: none; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-main { background: linear-gradient(45deg, var(--p), var(--s)); color: #000; }

        /* HUD */
        #gui { position: absolute; top: 15px; left: 15px; display: none; flex-direction: column; gap: 5px; z-index: 500; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.7); padding: 6px 15px; border-radius: 10px; border-left: 4px solid var(--p); font-size: 14px; font-weight: bold; }

        /* Джойстик */
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 600; border: 1px solid rgba(255,255,255,0.2); }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: var(--p); border-radius: 50%; box-shadow: 0 0 15px var(--p); }

        /* Хотбар действий */
        #actions { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 12px; z-index: 600; }
        .act-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid var(--p); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; position: relative; }
        .act-btn span { position: absolute; bottom: -18px; font-size: 9px; color: var(--p); font-weight: bold; text-align: center; width: 80px; }

        #market-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #16213e; padding: 25px; border-radius: 20px; display: none; z-index: 700; border: 2px solid var(--s); text-align: center; width: 260px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="window">
        <h1 style="color:var(--p); margin:0">OBLASTS</h1>
        <p style="font-size:10px; color:#888; margin-bottom:20px;">P2P MULTIPLAYER (MAX 6)</p>
        <input type="text" id="nick" placeholder="ТВОЙ НИК">
        <button class="btn btn-main" onclick="initPeer(true)">СОЗДАТЬ МИР</button>
        <input type="text" id="joinID" placeholder="ID ХОСТА">
        <button class="btn" style="background:#222; color:#fff" onclick="initPeer(false)">ПРИСОЕДИНИТЬСЯ</button>
    </div>
</div>

<div id="market-ui">
    <h3>РЫНОК ⚖️</h3>
    <button class="btn" onclick="trade('w2f')">50🌲 -> 30🍎</button>
    <button class="btn" onclick="trade('s2f')">50🪨 -> 40🍎</button>
    <button class="btn" style="background:#555" onclick="document.getElementById('market-ui').style.display='none'">ЗАКРИТЬ</button>
</div>

<div id="gui">
    <div class="stat">🌲 <span id="r_wood">0</span> | 🪨 <span id="r_stone">0</span></div>
    <div class="stat">🍎 <span id="r_food">0</span> | 👥 <span id="r_pop">0</span></div>
    <div class="stat" style="border-color: #ff3e3e;">⚔️ <span id="r_army">0</span></div>
    <div id="room-id-display" style="font-size:10px; color:gray; margin-top:5px;"></div>
</div>

<div id="joy-bg"><div id="joy-stick"></div></div>

<div id="actions">
    <div class="act-btn" onclick="act('mine')">⛏️<span>СБОР</span></div>
    <div class="act-btn" onclick="act('flag')">🚩<span>ОБЛАСТЬ</span></div>
    <div class="act-btn" onclick="act('house')">🏠<span>ДОМ</span></div>
    <div class="act-btn" onclick="act('farm')">🌾<span>ФЕРМА</span></div>
    <div class="act-btn" style="border-color:var(--s)" onclick="document.getElementById('market-ui').style.display='block'">⚖️<span>РЫНОК</span></div>
</div>

<canvas id="game"></canvas>

<script>
let peer, conn, myId, isHost = false;
let me = { x: 2500, y: 2500, wood: 100, stone: 50, food: 100, pop: 1, army: 0, nick: "", color: "#0f8" };
let players = {}, items = [], flags = [], buildings = [];
let mapS = 5000;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');

function initPeer(host) {
    if(typeof Peer === 'undefined') return alert("Скрипты заблокированы! Выключи AdBlock или используй VPN.");
    const n = document.getElementById('nick').value;
    if(!n) return alert("Введи ник!");
    me.nick = n; isHost = host;
    
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        if(isHost) {
            alert("ТВОЙ КОД МИРА: " + id);
            for(let i=0; i<80; i++) items.push({x:Math.random()*mapS, y:Math.random()*mapS, t:Math.random()>0.5?'t':'s'});
            start();
        } else {
            let tid = document.getElementById('joinID').value;
            if(!tid) return alert("Введи ID хоста!");
            conn = peer.connect(tid);
            setupConn(conn);
        }
    });
    peer.on('connection', setupConn);
}

function setupConn(c) {
    c.on('open', () => {
        conn = c; start();
        setInterval(() => conn.send({type:'upd', p: me}), 50);
    });
    c.on('data', d => {
        if(d.type==='upd') players[d.p.nick] = d.p;
        if(d.type==='world') { items = d.items; flags = d.flags; buildings = d.buildings; }
    });
}

function start() {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('gui').style.display = 'flex';
    document.getElementById('joy-bg').style.display = 'block';
    document.getElementById('actions').style.display = 'flex';
    document.getElementById('room-id-display').innerText = "ID: " + myId;
    
    setInterval(() => {
        if(me.food > 0) { me.food -= (me.pop*0.1 + me.army*0.2); me.pop += 0.05; }
        else { me.pop -= 0.3; me.army *= 0.9; }
        if(isHost) {
            Object.values(peer.connections).forEach(slot => {
                slot[0].send({type:'world', items, flags, buildings});
            });
        }
    }, 2000);
    requestAnimationFrame(loop);
}

function trade(t) {
    if(t==='w2f' && me.wood>=50) { me.wood-=50; me.food+=30; }
    if(t==='s2f' && me.stone>=50) { me.stone-=50; me.food+=40; }
}

function act(type) {
    if(type === 'mine') {
        items.forEach((it, i) => {
            if(Math.hypot(me.x-it.x, me.y-it.y) < 100) {
                if(it.t==='t') me.wood+=25; else me.stone+=20;
                if(isHost) items.splice(i,1); else conn.send({type:'mine', idx: i});
                return;
            }
        });
    }
    if(type === 'flag' && me.wood >= 50) { flags.push({x:me.x, y:me.y, c:me.color}); me.wood-=50; }
}

// Джойстик
const jBg = document.getElementById('joy-bg'), jSt = document.getElementById('joy-stick');
function hS(cx, cy) { joy.active = true; joy.startX = cx; joy.startY = cy; }
function hM(cx, cy) {
    if(!joy.active) return;
    let dx = cx - joy.startX, dy = cy - joy.startY;
    let dist = Math.min(Math.hypot(dx, dy), 40), ang = Math.atan2(dy, dx);
    joy.x = Math.cos(ang)*(dist/40); joy.y = Math.sin(ang)*(dist/40);
    jSt.style.transform = `translate(${joy.x*40}px,${joy.y*40}px)`;
}
function hE() { joy.active = false; joy.x = joy.y = 0; jSt.style.transform = `translate(0,0)`; }
jBg.onpointerdown = e => hS(e.clientX, e.clientY);
window.onpointermove = e => hM(e.clientX, e.clientY);
window.onpointerup = hE;

function loop() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if(joy.active) { me.x += joy.x*8; me.y += joy.y*8; }
    ctx.save(); ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);
    
    // Полотно
    ctx.fillStyle = "white"; ctx.fillRect(0,0,mapS,mapS);
    
    flags.forEach(f => {
        ctx.fillStyle = f.c + "33"; ctx.beginPath(); ctx.arc(f.x, f.y, 350, 0, 7); ctx.fill();
        ctx.fillStyle = f.c; ctx.fillRect(f.x-2, f.y-35, 4, 35);
    });
    items.forEach(it => { ctx.fillStyle = it.t==='t'?'#0f8':'#777'; ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, 7); ctx.fill(); });
    
    [me, ...Object.values(players)].forEach(p => {
        ctx.fillStyle = p.nick === me.nick ? '#0f8' : '#0df';
        ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
        ctx.fillStyle = "black"; ctx.fillText(p.nick, p.x-10, p.y-25);
    });

    ctx.restore();
    
    // Туман войны (сверху)
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 250, 0, 7); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    document.getElementById('r_wood').innerText = Math.floor(me.wood);
    document.getElementById('r_stone').innerText = Math.floor(me.stone);
    document.getElementById('r_food').innerText = Math.floor(me.food);
    document.getElementById('r_pop').innerText = Math.floor(me.pop);
    requestAnimationFrame(loop);
}
</script>
</body>
</html>

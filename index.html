<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Offline-First Edition</title>
    
    <!-- Используем максимально надежный источник для связи -->
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --p: #00ff88; --bg: #0a0a0f; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        
        /* ЛОББИ */
        #lobby { position: absolute; inset: 0; background: #111; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .win { background: #1a1a25; padding: 30px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #222; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-host { background: var(--p); color: #000; }
        .btn-join { background: #00d4ff; color: #000; }

        /* ИНТЕРФЕЙС */
        #gui { position: absolute; top: 15px; left: 15px; display: none; flex-direction: column; gap: 5px; z-index: 500; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 8px; border-left: 3px solid var(--p); font-size: 14px; }

        /* ДЖОЙСТИК */
        #joy-bg { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 600; border: 1px solid #444; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: var(--p); border-radius: 50%; }

        /* КНОПКИ ДЕЙСТВИЙ */
        #actions { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 600; }
        .act-btn { width: 65px; height: 65px; background: rgba(0,0,0,0.6); border: 2px solid var(--p); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; position: relative; }
        .act-btn span { position: absolute; bottom: -18px; font-size: 8px; color: var(--p); font-weight: bold; width: 80px; text-align: center; }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="win">
        <h1 style="color:var(--p)">OBLASTS</h1>
        <input type="text" id="nick" placeholder="ТВОЙ НИК">
        <input type="text" id="room" placeholder="КОД КОМНАТЫ">
        <button class="btn-host" onclick="initPeer(true)">СОЗДАТЬ</button>
        <button class="btn-join" onclick="initPeer(false)">ПРИСОЕДИНИТЬСЯ</button>
        <p id="status" style="font-size:10px; color:#666; margin-top:10px;">Ожидание действий...</p>
    </div>
</div>

<div id="gui">
    <div class="stat">🌲 <span id="r_wood">0</span></div>
    <div class="stat">🪨 <span id="r_stone">0</span></div>
    <div class="stat">🍎 <span id="r_food">0</span></div>
    <div class="stat">👥 <span id="r_pop">0</span></div>
</div>

<div id="joy-bg"><div id="joy-stick"></div></div>
<div id="actions">
    <div class="act-btn" onclick="act('mine')">⛏️<span>СБОР</span></div>
    <div class="act-btn" onclick="act('flag')">🚩<span>ОБЛАСТЬ</span></div>
    <div class="act-btn" onclick="act('house')">🏠<span>ДОМ</span></div>
</div>

<canvas id="game"></canvas>

<script>
let peer, conn;
let me = { id: '', nick: '', x: 2500, y: 2500, wood: 100, stone: 50, food: 100, pop: 1, color: '' };
let players = {}, flags = [], items = [];
let mapS = 5000;
let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function initPeer(isHost) {
    const nick = document.getElementById('nick').value;
    const room = document.getElementById('room').value;
    if(!nick || !room) return alert("Заполни поля!");

    me.nick = nick;
    me.color = `hsl(${Math.random()*360}, 75%, 55%)`;
    document.getElementById('status').innerText = "Подключение...";

    // Создаем ID на основе кода комнаты
    const peerId = isHost ? "oblast-" + room : "oblast-" + room + "-" + Math.floor(Math.random()*999);
    peer = new Peer(peerId);

    peer.on('open', (id) => {
        me.id = id;
        if(!isHost) {
            conn = peer.connect("oblast-" + room);
            setupConn(conn);
        }
        startWorld();
    });

    peer.on('connection', (c) => {
        setupConn(c);
    });

    peer.on('error', (err) => alert("Ошибка связи: " + err.type));
}

function setupConn(c) {
    c.on('data', (data) => {
        if(data.type === 'sync') { players[data.player.id] = data.player; flags = data.flags; items = data.items; }
    });
}

function startWorld() {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('gui').style.display = 'flex';
    document.getElementById('joy-bg').style.display = 'block';
    document.getElementById('actions').style.display = 'flex';

    // Генерация ресурсов (только если мы первые)
    for(let i=0; i<100; i++) {
        items.push({x: Math.random()*mapS, y: Math.random()*mapS, type: Math.random()>0.5?'t':'s'});
    }

    setInterval(() => {
        if(conn) conn.send({type: 'sync', player: me, flags: flags, items: items});
        // Если хост, рассылаем всем (в этой упрощенной версии просто обмен)
    }, 100);

    requestAnimationFrame(loop);
}

function act(type) {
    if(type === 'mine') {
        for(let i=0; i<items.length; i++) {
            if(Math.hypot(me.x - items[i].x, me.y - items[i].y) < 100) {
                if(items[i].type === 't') me.wood += 20; else me.stone += 15;
                items.splice(i, 1); return;
            }
        }
    }
    if(type === 'flag' && me.wood >= 50) {
        flags.push({x: me.x, y: me.y, color: me.color, owner: me.nick});
        me.wood -= 50;
    }
    if(type === 'house' && me.wood >= 80) {
        me.pop += 5; me.wood -= 80;
    }
}

// УПРАВЛЕНИЕ
const jBg = document.getElementById('joy-bg'), jSt = document.getElementById('joy-stick');
jBg.onpointerdown = (e) => { joy.active = true; joy.startX = e.clientX; joy.startY = e.clientY; };
window.onpointermove = (e) => {
    if(!joy.active) return;
    let dx = e.clientX - joy.startX, dy = e.clientY - joy.startY;
    let dist = Math.min(Math.hypot(dx, dy), 35), angle = Math.atan2(dy, dx);
    joy.x = Math.cos(angle) * (dist / 35); joy.y = Math.sin(angle) * (dist / 35);
    jSt.style.transform = `translate(${joy.x*35}px, ${joy.y*35}px)`;
};
window.onpointerup = () => { joy.active = false; joy.x = joy.y = 0; jSt.style.transform = `translate(0,0)`; };

function loop() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if(joy.active) { me.x += joy.x * 8; me.y += joy.y * 8; }

    ctx.save();
    ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);
    
    // Сетка
    ctx.strokeStyle = "#222";
    for(let i=0; i<=mapS; i+=200) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,mapS); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(mapS,i); ctx.stroke(); }

    flags.forEach(f => {
        ctx.fillStyle = f.color + "33"; ctx.beginPath(); ctx.arc(f.x, f.y, 350, 0, 7); ctx.fill();
        ctx.fillStyle = f.color; ctx.fillRect(f.x-2, f.y-30, 4, 30);
    });

    items.forEach(it => {
        ctx.fillStyle = it.type === 't' ? "#00ff88" : "#777";
        ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, 7); ctx.fill();
    });

    // Рисуем меня
    ctx.fillStyle = me.color; ctx.beginPath(); ctx.arc(me.x, me.y, 20, 0, 7); ctx.fill();
    ctx.fillStyle = "white"; ctx.fillText(me.nick, me.x-15, me.y-30);

    // Рисуем других
    for(let id in players) {
        let p = players[id];
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
        ctx.fillText(p.nick, p.x-15, p.y-30);
    }

    ctx.restore();

    document.getElementById('r_wood').innerText = me.wood;
    document.getElementById('r_stone').innerText = me.stone;
    document.getElementById('r_food').innerText = me.food;
    document.getElementById('r_pop').innerText = me.pop;

    requestAnimationFrame(loop);
}
</script>
</body>
</html>

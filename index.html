<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Pro Edition</title>
    
    <!-- Подключаем Playroom SDK первым делом -->
    <script src="https://unpkg.com"></script>

    <style>
        :root { --p: #00ff88; --s: #00d4ff; --bg: #0a0a0f; --glass: rgba(255,255,255,0.05); }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; user-select: none; }
        
        /* ИНТЕРФЕЙС РЕСУРСОВ */
        #hud { position: absolute; top: 20px; left: 20px; display: none; flex-direction: column; gap: 8px; z-index: 500; pointer-events: none; }
        .res-card { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 12px; border-left: 4px solid var(--p); display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .res-card b { font-size: 18px; }

        /* ГОРЯЧАЯ ПАНЕЛЬ (СТРОИТЕЛЬСТВО) */
        #hotbar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 12px; z-index: 600; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .slot { width: 65px; height: 65px; background: var(--glass); border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .slot:hover { border-color: var(--p); background: rgba(0,255,136,0.1); transform: translateY(-5px); }
        .slot span { font-size: 26px; }
        .slot small { font-size: 9px; color: var(--p); font-weight: 900; margin-top: 2px; }

        /* ДЖОЙСТИК */
        #joy-bg { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); display: none; z-index: 500; }
        #joy-stick { position: absolute; top: 35px; left: 40px; width: 50px; height: 50px; background: var(--p); border-radius: 50%; box-shadow: 0 0 20px var(--p); }

        canvas { display: block; }
        #loading { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index:2000; font-size:24px; letter-spacing:3px; }
    </style>
</head>
<body>

<div id="loading">ЗАГРУЗКА ИМПЕРИИ...</div>

<div id="hud">
    <div class="res-card">🌲 <b><span id="r_wood">0</span></b></div>
    <div class="res-card">🪨 <b><span id="r_stone">0</span></b></div>
    <div class="res-card">🍎 <b><span id="r_food">0</span></b></div>
    <div class="res-card">👥 <b><span id="r_pop">0</span></b></div>
    <div class="res-card" style="border-color: #ff3e3e;">⚔️ <b><span id="r_army">0</span></b></div>
</div>

<div id="joy-bg"><div id="joy-stick"></div></div>

<div id="hotbar">
    <div class="slot" onclick="act('mine')"><span>⛏️</span><small>СБОР</small></div>
    <div class="slot" onclick="act('flag')"><span>🚩</span><small>ОБЛАСТЬ</small></div>
    <div class="slot" onclick="act('house')"><span>🏠</span><small>ДОМ</small></div>
    <div class="slot" onclick="act('farm')"><span>🌾</span><small>ФЕРМА</small></div>
    <div class="slot" onclick="act('army')"><span>⚔️</span><small>АРМИЯ</small></div>
</div>

<canvas id="game"></canvas>

<script>
// Ждем загрузку Playroom
async function start() {
    if (typeof Playroom === 'undefined') {
        alert("Ошибка сети! Обнови страницу или выключи AdBlock.");
        return;
    }

    // ЛОББИ PLAYROOM
    await Playroom.insertCoin();
    document.getElementById('loading').remove();
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('hotbar').style.display = 'flex';
    document.getElementById('joy-bg').style.display = 'block';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const mapS = 5000;
    
    let me = Playroom.myPlayer();
    let players = [];
    let joy = { active: false, x: 0, y: 0, startX: 0, startY: 0 };

    // Инициализация ресурсов и позиции
    me.setState("pos", {x: 2500, y: 2500});
    me.setState("res", { wood: 150, stone: 60, food: 100, army: 0, pop: 1 });

    // Генерация ресурсов (только хостом)
    if (Playroom.isHost()) {
        let items = [];
        for(let i=0; i<150; i++){
            let t = Math.random();
            items.push({x: Math.random()*mapS, y: Math.random()*mapS, type: t>0.7?'t':(t>0.4?'s':'f')});
        }
        Playroom.setState("worldItems", items);
        Playroom.setState("worldBuildings", []);
    }

    Playroom.onPlayerJoin((p) => {
        players.push(p);
        p.onQuit(() => players = players.filter(pl => pl.id !== p.id));
    });

    // Действия (кнопки)
    window.act = function(type) {
        let res = me.getState("res");
        let pos = me.getState("pos");

        if (type === 'mine') {
            let items = Playroom.getState("worldItems") || [];
            for(let i=0; i<items.length; i++) {
                if(Math.hypot(pos.x - items[i].x, pos.y - items[i].y) < 100) {
                    if(items[i].type === 't') res.wood += 30;
                    else if(items[i].type === 's') res.stone += 20;
                    else res.food += 40;
                    items.splice(i, 1);
                    Playroom.setState("worldItems", items);
                    me.setState("res", res);
                    return;
                }
            }
        }
        if (type === 'flag' && res.wood >= 50) {
            build('flag', pos, res, 50, 0);
        }
        if (type === 'house' && res.wood >= 100 && res.stone >= 40) {
            build('house', pos, res, 100, 40);
        }
        if (type === 'farm' && res.wood >= 60 && res.stone >= 80) {
            build('farm', pos, res, 60, 80);
        }
        if (type === 'army' && res.food >= 60) {
            res.army++; res.food -= 60; me.setState("res", res);
        }
    };

    function build(t, p, r, cw, cs) {
        let b = Playroom.getState("worldBuildings") || [];
        b.push({x: p.x, y: p.y, type: t, color: me.getProfile().color.hex, owner: me.id});
        Playroom.setState("worldBuildings", b);
        r.wood -= cw; r.stone -= cs;
        me.setState("res", r);
    }

    // Управление джойстиком
    const jBg = document.getElementById('joy-bg'), jSt = document.getElementById('joy-stick');
    jBg.onpointerdown = (e) => { joy.active = true; joy.startX = e.clientX; joy.startY = e.clientY; };
    window.onpointermove = (e) => {
        if(!joy.active) return;
        let dx = e.clientX - joy.startX, dy = e.clientY - joy.startY;
        let dist = Math.min(Math.hypot(dx, dy), 40), angle = Math.atan2(dy, dx);
        joy.x = Math.cos(angle) * (dist / 40); joy.y = Math.sin(angle) * (dist / 40);
        jSt.style.transform = `translate(${joy.x*40}px, ${joy.y*40}px)`;
    };
    window.onpointerup = () => { joy.active = false; joy.x = joy.y = 0; jSt.style.transform = `translate(0,0)`; };

    // Главный цикл
    function loop() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pos = me.getState("pos");
        let res = me.getState("res");

        if (joy.active) {
            pos.x += joy.x * 9; pos.y += joy.y * 9;
            me.setState("pos", pos);
        }

        ctx.save();
        ctx.translate(canvas.width/2 - pos.x, canvas.height/2 - pos.y);
        
        // Рисуем здания (флаги, дома)
        (Playroom.getState("worldBuildings") || []).forEach(b => {
            if(b.type === 'flag') {
                ctx.fillStyle = b.color + "15"; ctx.beginPath(); ctx.arc(b.x, b.y, 400, 0, 7); ctx.fill();
                ctx.fillStyle = b.color; ctx.fillRect(b.x-2, b.y-40, 4, 40); ctx.fillRect(b.x, b.y-40, 25, 15);
            } else {
                ctx.fillStyle = b.type==='house'?'#ff4400':'#ffcc00'; ctx.fillRect(b.x-30, b.y-30, 60, 60);
                ctx.strokeStyle="white"; ctx.strokeRect(b.x-30, b.y-30, 60, 60);
            }
        });

        // Рисуем ресурсы
        (Playroom.getState("worldItems") || []).forEach(it => {
            ctx.fillStyle = it.type==='t'?'#00ff88':(it.type==='s'?'#777':'#ffaa00');
            ctx.beginPath(); ctx.arc(it.x, it.y, 18, 0, 7); ctx.fill();
        });

        // Рисуем игроков
        players.forEach(p => {
            let pPos = p.getState("pos");
            if(!pPos) return;
            ctx.fillStyle = p.getProfile().color.hex;
            ctx.beginPath(); ctx.arc(pPos.x, pPos.y, 22, 0, 7); ctx.fill();
            ctx.fillStyle = "white"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center";
            ctx.fillText(p.getProfile().name + " (⚔️"+(p.getState("res")?.army || 0)+")", pPos.x, pPos.y - 35);
        });

        ctx.restore();

        // HUD Update
        document.getElementById('r_wood').innerText = Math.floor(res.wood);
        document.getElementById('r_stone').innerText = Math.floor(res.stone);
        document.getElementById('r_food').innerText = Math.floor(res.food);
        document.getElementById('r_pop').innerText = Math.floor(res.pop);
        document.getElementById('r_army').innerText = Math.floor(res.army);

        requestAnimationFrame(loop);
    }
    
    // Экономика (еда/население)
    setInterval(() => {
        let res = me.getState("res");
        let buildings = Playroom.getState("worldBuildings") || [];
        let myFarms = buildings.filter(b => b.owner === me.id && b.type === 'farm').length;
        let myHouses = buildings.filter(b => b.owner === me.id && b.type === 'house').length;
        
        res.food += myFarms * 7;
        if(res.food > 0) {
            res.food -= (res.pop * 0.2 + res.army * 0.4);
            if(res.pop < 10 + myHouses * 20) res.pop += 0.3;
        } else { res.pop -= 0.6; res.army *= 0.8; if(res.pop < 1) res.pop = 1; }
        me.setState("res", res);
    }, 3000);

    requestAnimationFrame(loop);
}

start();
</script>
</body>
</html>

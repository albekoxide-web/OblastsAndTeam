<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oblasts & Team: Emergency Fix</title>
    <!-- Прямое подключение без лишних скриптов -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { margin: 0; background: #050508; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .win { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { padding: 12px; margin: 10px; border-radius: 8px; border: none; text-align: center; }
        button { padding: 12px 25px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lobby" class="win">
        <h1>OBLASTS</h1>
        <p id="status">Загрузка базы данных...</p>
        <input type="text" id="nick" placeholder="НИК">
        <input type="text" id="room" placeholder="КОМНАТА">
        <br>
        <button onclick="enter()">ВОЙТИ</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxOs_OKSmIm5vv2ruW_8HGTjHK0lo-9nI",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "oblastandteam",
            storageBucket: "oblastandteam.firebasestorage.app",
            messagingSenderId: "1070668055977",
            appId: "1:1070668055977:web:01886461edd6a9cedf30b8"
        };

        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('status').innerText = "Связь с космосом установлена ✅";
            document.getElementById('status').style.color = "#00ff88";
        } catch(e) {
            document.getElementById('status').innerText = "Ошибка: Провайдер блокирует Google Firebase ❌";
            document.getElementById('status').style.color = "red";
        }

        function enter() {
            const r = document.getElementById('room').value.toUpperCase();
            const n = document.getElementById('nick').value;
            if(!r || !n) return alert("Заполни поля");
            // Проверка записи
            db.ref('rooms/'+r+'/players/'+n).set({status: "online"}).then(() => {
                alert("Ты в игре! (Механики подгрузятся после этого теста)");
            }).catch(e => alert("Блокировка записи: " + e.message));
        }
    </script>
</body>
</html>
